name: MCP Matrix

on:
  push:
    branches:
      - feat/mcp-rust-sdk-conversion

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check

  membrane-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce no direct rmcp imports outside SDK
        run: |
          set -e
          # Fail if any `use rmcp::` import appears outside the SDK adapter
          if grep -RIn "^\s*use\s\+rmcp::" codex-rs \
               --exclude-dir=codex-rs/codex-mcp-sdk; then
            echo "Found direct rmcp import outside SDK" >&2
            exit 1
          fi
          # Fail if any rmcp_crate import appears outside the SDK adapter
          if grep -RIn "^\s*use\s\+rmcp_crate::" codex-rs \
               --exclude-dir=codex-rs/codex-mcp-sdk; then
            echo "Found rmcp_crate import outside SDK" >&2
            exit 1
          fi
          echo "Membrane checks passed"

  sdk-stdio:
    runs-on: ubuntu-latest
    needs: [fmt, membrane-guard]
    env:
      CODEX_MCP_IMPL: official
      RUST_LOG: info
      RUST_TEST_THREADS: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p codex-mcp-server -- --nocapture

  sdk-http:
    runs-on: ubuntu-latest
    needs: [fmt, membrane-guard]
    env:
      CODEX_MCP_IMPL: official
      RUST_LOG: info
      RUST_TEST_THREADS: 1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: >
          cargo test -p codex-mcp-server
          --test http_roundtrip
          --test http_session_header
          --test echo_tool_http
          --test cancel_http
          --test timeout_call
          -- --nocapture

  sdk-client:
    runs-on: ubuntu-latest
    needs: [fmt, membrane-guard]
    env:
      RUST_LOG: info
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p codex-mcp-client --features sdk -- --nocapture

  sdk-sdk:
    runs-on: ubuntu-latest
    needs: [fmt, membrane-guard]
    env:
      RUST_LOG: info
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p codex-mcp-sdk --features rmcp -- --nocapture
